<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>約局 Calendar</title>
  <!-- 載入 Firebase 9.x 兼容版 SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --primary: #4a90e2;
      --red: #ff4d4f;
      --yellow: #ffec3d;
      --green: #52c41a;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-color); margin: 0; padding: 15px; color: #333; }
    
    .container { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    
    h1 { text-align: center; margin-top: 0; color: #2c3e50; font-size: 1.8rem; }

    .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
    .select-group { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    label { font-weight: bold; font-size: 0.95rem; }
    
    select, input[type="month"] {
      padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; outline: none; width: 60%;
    }

    .month-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .month-btn { background: var(--primary); color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 1rem; }

    .sync-status {
      text-align: center; font-size: 0.85rem; padding: 6px; margin-bottom: 12px; border-radius: 6px; background: #e6f7ff; color: #1890ff; font-weight: 500;
    }

    .legend { display: flex; justify-content: space-around; margin-bottom: 15px; padding: 8px; background: #fafafa; border-radius: 8px; font-size: 0.85rem; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .dot.red { background: var(--red); }
    .dot.yellow { background: var(--yellow); }
    .dot.green { background: var(--green); }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
    .weekday { font-weight: bold; padding: 8px 0; color: #666; font-size: 0.9rem; }
    
    .day-cell {
      min-height: 70px; border: 1px solid #e8e8e8; border-radius: 8px; padding: 4px;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      cursor: pointer; transition: all 0.2s ease; background-color: #fff;
    }
    .day-cell.empty { background: transparent; border: none; cursor: default; }
    .day-number { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }

    .status-1 { background-color: var(--red) !important; color: white; }
    .status-2 { background-color: var(--yellow) !important; color: #333; }
    .status-3 { background-color: var(--green) !important; color: white; }

    .all-users-list { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; width: 100%; }
    .user-badge {
      font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; color: white; font-weight: 500;
    }
    .user-badge.status-1 { background: var(--red); }
    .user-badge.status-2 { background: var(--yellow); color: #333; }
    .user-badge.status-3 { background: var(--green); }
    .user-badge.status-0 { background: #d9d9d9; color: #666; }
  </style>
</head>
<body>

<div class="container">
  <h1>約局</h1>

  <div class="controls">
    <div class="select-group">
      <label for="userSelect">選擇名字：</label>
      <select id="userSelect" onchange="renderCalendar()">
        <option value="Ber">Ber</option>
        <option value="cwk">cwk</option>
        <option value="Mingo">Mingo</option>
        <option value="Oscar">Oscar</option>
        <option value="ALL">所有人</option>
      </select>
    </div>
  </div>

  <div class="month-bar">
    <button class="month-btn" onclick="changeMonth(-1)">❮ 上個月</button>
    <input type="month" id="monthPicker" onchange="renderCalendar()">
    <button class="month-btn" onclick="changeMonth(1)">下個月 ❯</button>
  </div>

  <div id="syncStatus" class="sync-status">🟡 正在連接雲端...</div>

  <div class="legend">
    <div class="legend-item"><span class="dot red"></span> 1按: 唔得閒</div>
    <div class="legend-item"><span class="dot yellow"></span> 2按: 暫定</div>
    <div class="legend-item"><span class="dot green"></span> 3按: Free</div>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<script>
  // --- 1. Firebase 免費公共即時雲端數據庫配置 ---
  const firebaseConfig = {
    databaseURL: "https://gather-calendar-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  // 初始化 Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const calendarRef = db.ref("schedule_data");

  const users = ["Ber", "cwk", "Mingo", "Oscar"];
  let currentDate = new Date();
  let store = {};

  const userSelect = document.getElementById('userSelect');
  const monthPicker = document.getElementById('monthPicker');
  const calendarGrid = document.getElementById('calendarGrid');
  const syncStatus = document.getElementById('syncStatus');

  function setStatusMsg(msg, color="#1890ff") {
    syncStatus.innerText = msg;
    syncStatus.style.color = color;
  }

  // --- 2. 監聽 Firebase 實時數據更新 (Realtime Sync) ---
  calendarRef.on('value', (snapshot) => {
    const data = snapshot.val();
    store = data || {};
    // 本地備份
    localStorage.setItem('gather_calendar_data', JSON.stringify(store));
    setStatusMsg("🟢 雲端即時同步中 (Refresh 唔會清空)", "#52c41a");
    renderCalendar();
  }, (error) => {
    console.error("Firebase Error:", error);
    // 斷網 fallback: 讀取 LocalStorage
    const local = localStorage.getItem('gather_calendar_data');
    if (local) store = JSON.parse(local);
    setStatusMsg("🟡 離線模式 (已載入本地紀錄)", "#faad14");
    renderCalendar();
  });

  // --- 3. 點擊寫入 Firebase ---
  function handleDayClick(dateStr, user) {
    if (!store[dateStr]) store[dateStr] = {};
    let currentStatus = store[dateStr][user] || 0;
    currentStatus = (currentStatus + 1) % 4;
    
    if (currentStatus === 0) {
      delete store[dateStr][user];
      // 如果日期下冇任何用戶資料，刪除該日期节点
      if (Object.keys(store[dateStr]).length === 0) {
        delete store[dateStr];
      }
    } else {
      store[dateStr][user] = currentStatus;
    }

    renderCalendar();

    // 即時推送到雲端
    setStatusMsg("⏳ 儲存中...", "#1890ff");
    calendarRef.set(store).then(() => {
      setStatusMsg("🟢 儲存成功！所有人即時更新", "#52c41a");
    }).catch(err => {
      setStatusMsg("⚠️ 儲存失敗，請檢查網絡", "#ff4d4f");
    });
  }

  // --- 4. 日曆畫圖邏輯 ---
  function renderCalendar() {
    if (!monthPicker.value) return;
    calendarGrid.innerHTML = '';
    
    const parts = monthPicker.value.split('-');
    const year = parseInt(parts[0]);
    const month = parseInt(parts[1]);
    const selectedUser = userSelect.value;

    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    weekdays.forEach(d => {
      const el = document.createElement('div');
      el.className = 'weekday';
      el.innerText = d;
      calendarGrid.appendChild(el);
    });

    const firstDay = new Date(year, month - 1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const emptyCell = document.createElement('div');
      emptyCell.className = 'day-cell empty';
      calendarGrid.appendChild(emptyCell);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const dayNum = document.createElement('div');
      dayNum.className = 'day-number';
      dayNum.innerText = day;
      cell.appendChild(dayNum);

      const dayData = store[dateStr] || {};

      if (selectedUser !== 'ALL') {
        const status = dayData[selectedUser] || 0;
        if (status > 0) {
          cell.classList.add(`status-${status}`);
        }
        cell.onclick = () => handleDayClick(dateStr, selectedUser);
      } else {
        const badgeContainer = document.createElement('div');
        badgeContainer.className = 'all-users-list';

        users.forEach(u => {
          const uStatus = dayData[u] || 0;
          const badge = document.createElement('span');
          badge.className = `user-badge status-${uStatus}`;
          badge.innerText = u;
          badgeContainer.appendChild(badge);
        });

        cell.appendChild(badgeContainer);
        cell.style.cursor = 'default';
      }

      calendarGrid.appendChild(cell);
    }
  }

  function changeMonth(delta) {
    currentDate.setMonth(currentDate.getMonth() + delta);
    const year = currentDate.getFullYear();
    const month = String(currentDate.getMonth() + 1).padStart(2, '0');
    monthPicker.value = `${year}-${month}`;
    renderCalendar();
  }

  function init() {
    const year = currentDate.getFullYear();
    const month = String(currentDate.getMonth() + 1).padStart(2, '0');
    monthPicker.value = `${year}-${month}`;
    
    // 即時渲染初版 UI
    renderCalendar();
  }

  init();
</script>
</body>
</html>
